services:
  mysql:
    image: mysql:8.4
    container_name: inventory-mysql
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: inventory-app
    env_file:
      - .env
    depends_on:
      - mysql
    volumes:
      - ./app:/app
    working_dir: /app
    tty: true
    stdin_open: true

volumes:
  mysql_data:
